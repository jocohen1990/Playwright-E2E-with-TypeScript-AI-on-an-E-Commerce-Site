name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    # run inside a Docker container based on the official Node image
    runs-on: ubuntu-latest
    container:
      image: node:22.11.0
    # matrix not needed when using fixed container image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: [22.11.0]
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run API and utils tests
        run: |
          npx playwright install --with-deps
          # run only spec files under tests/api and tests/utils
          npx playwright test tests/api/** tests/utils/**
        env:
          CI: true

      # optionally upload Playwright report if needed
      - name: Archive Playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
